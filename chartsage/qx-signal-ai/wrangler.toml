name = "chartsage"
main = "src/index.js"
compatibility_date = "2026-07-01"
account_id = "ea2eb3a9813660dfca2a60e594858538"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "PRICE_WATCHER"
class_name = "PriceWatcher"

[[migrations]]
tag = "v1"
new_classes = ["PriceWatcher"]

[triggers]
# Auto-grades open live signals by walking real 1m candles (TP/SL first-touch)
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "chartsage-db"
database_id = "18871b09-cd6d-4527-a3f5-cfad12be4908"
